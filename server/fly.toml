# Fly.io deploy config for the OpenDraft API (api.opendraft.co)
# Deploy with: `flyctl deploy --config server/fly.toml --dockerfile server/Dockerfile`

app = "opendraft-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  FRONTEND_URL = "https://opendraft.co"
  WORKOS_REDIRECT_URI = "https://opendraft.co/auth/callback"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

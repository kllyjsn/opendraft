# Stripe webhook must NOT verify JWT — Stripe sends requests without a Supabase auth token.
# We verify the request authenticity using the Stripe webhook signature (STRIPE_WEBHOOK_SECRET) instead.
[functions.stripe-webhook]
verify_jwt = false

